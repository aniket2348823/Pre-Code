apiVersion: v1
kind: Service
metadata:
  name: vigilagent-api
  namespace: vigilagent
  labels:
    app: vigilagent
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  - port: 9090
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    app: vigilagent
    component: api
