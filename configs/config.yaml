# VigilAgent Configuration
# Defaults for local development with docker-compose
# Supabase overrides: set VIGILAGENT_DATABASE_* in .env file

server:
  host: 0.0.0.0
  port: 8080
  env: development
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 120s

database:
  host: localhost
  port: 5432
  user: vigilagent
  password: vigilagent_dev
  name: vigilagent
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 10
  max_lifetime: 5m

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

auth:
  jwt_secret: change-me-in-production
  jwt_expiration: 24h
  api_key_prefix: va_

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
  allowed_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowed_headers:
    - Accept
    - Authorization
    - Content-Type
    - X-API-Key
    - X-Request-ID
  allow_credentials: false
  max_age: 86400

stripe:
  secret_key: ""
  webhook_secret: ""
  success_url: http://localhost:8080/success
  cancel_url: http://localhost:8080/cancel

log:
  level: info
  format: json

nats:
  url: "nats://localhost:4222"
  stream: "vigilagent"
  max_reconnect: 5
  reconnect_wait: 2s
