openapi: 3.0.3
info:
  title: VigilAgent API
  description: Centralized API for VigilAgent orchestrator, agent runtime, safety, analytics, and security posture scanning.
  version: 1.0.0
servers:
  - url: /api/v1
    description: Local API server
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
  /ready:
    get:
      summary: Readiness check
      responses:
        '200':
          description: Service is ready
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        '200':
          description: Prometheus metrics format
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                password:
                  type: string
                name:
                  type: string
      responses:
        '201':
          description: User registered successfully
  /auth/login:
    post:
      summary: Authenticate and log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
  /organizations:
    post:
      summary: Create an organization
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Organization created
    get:
      summary: List organizations
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        '200':
          description: List of organizations
  /projects:
    post:
      summary: Create a project
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - org_id
                - name
              properties:
                org_id:
                  type: string
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Project created
    get:
      summary: List projects
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: org_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of projects
  /tasks:
    post:
      summary: Create and run a task
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - prompt
                - project_id
              properties:
                prompt:
                  type: string
                project_id:
                  type: string
                max_tokens:
                  type: integer
                max_iterations:
                  type: integer
      responses:
        '201':
          description: Task created and started
    get:
      summary: List tasks
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of tasks
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
