groups:
  - name: vigilagent_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for 5 minutes"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "95th percentile latency is above 2 seconds"

      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total{namespace="vigilagent"}[15m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod is crash looping"

      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes{namespace="vigilagent"} / container_spec_memory_limit_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"

      - alert: DatabaseConnectionPoolExhausted
        expr: pg_stat_activity_count > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool nearly exhausted"

      - alert: LLMProviderDown
        expr: llm_provider_healthy == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "LLM provider health check failing"

      - alert: BudgetExceeded
        expr: increase(budget_exceeded_total[1h]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Budget threshold exceeded"
