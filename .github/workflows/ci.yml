name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: vigilagent
          POSTGRES_PASSWORD: vigilagent_test
          POSTGRES_DB: vigilagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vigilagent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...
        env:
          VIGILAGENT_DB_HOST: localhost
          VIGILAGENT_DB_PORT: 5432
          VIGILAGENT_DB_USER: vigilagent
          VIGILAGENT_DB_PASSWORD: vigilagent_test
          VIGILAGENT_DB_NAME: vigilagent_test
          VIGILAGENT_DB_SSLMODE: disable
          VIGILAGENT_REDIS_HOST: localhost
          VIGILAGENT_REDIS_PORT: 6379

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Vet
        run: go vet ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build
        run: go build -o bin/vigilagent .
