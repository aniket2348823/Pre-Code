components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  parameters:
    OrgID:
      name: orgID
      in: path
      required: true
      schema:
        type: string
    ProjectID:
      name: projectID
      in: path
      required: true
      schema:
        type: string
    AgentID:
      name: agentID
      in: path
      required: true
      schema:
        type: string
    SessionID:
      name: sessionID
      in: path
      required: true
      schema:
        type: string
    TaskID:
      name: taskID
      in: path
      required: true
      schema:
        type: string
    SkillID:
      name: skillID
      in: path
      required: true
      schema:
        type: string
    AlertID:
      name: alertID
      in: path
      required: true
      schema:
        type: string
    KeyID:
      name: keyID
      in: path
      required: true
      schema:
        type: string
    WebhookID:
      name: webhookID
      in: path
      required: true
      schema:
        type: string
    UserID:
      name: userID
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing/invalid auth
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    HealthResponse:
      type: object
      properties:
        status:
          type: string
    ReadinessResponse:
      type: object
      properties:
        status:
          type: object
          properties:
            ready:
              type: boolean
        checks:
          type: object
          additionalProperties:
            type: string
    RegisterResponse:
      type: object
      properties:
        token:
          type: string
        user_id:
          type: string
    LoginResponse:
      type: object
      properties:
        token:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
        is_active:
          type: boolean
        email_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 12
    Organization:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        owner_id:
          type: string
        plan:
          type: string
        created_at:
          type: string
          format: date-time
    Project:
      type: object
      properties:
        id:
          type: string
        org_id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
    CreateTaskRequest:
      type: object
      required: [prompt, project_id]
      properties:
        prompt:
          type: string
        project_id:
          type: string
        model:
          type: string
    Task:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        user_id:
          type: string
        prompt:
          type: string
        status:
          type: string
        model:
          type: string
        cost:
          type: number
        created_at:
          type: string
          format: date-time
    Agent:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        name:
          type: string
        description:
          type: string
        config:
          type: object
        status:
          type: string
        created_at:
          type: string
          format: date-time
    Session:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        agent_id:
          type: string
        user_id:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
    EventInput:
      type: object
      required: [event_type]
      properties:
        event_type:
          type: string
        source:
          type: string
        payload:
          type: object
        tokens_used:
          type: integer
        cost_usd:
          type: number
        latency_ms:
          type: integer
    Event:
      type: object
      properties:
        id:
          type: string
        session_id:
          type: string
        event_type:
          type: string
        created_at:
          type: string
          format: date-time
    Skill:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        category:
          type: string
        description:
          type: string
        downloads:
          type: integer
        rating:
          type: number
        created_at:
          type: string
          format: date-time
    SkillRating:
      type: object
      properties:
        id:
          type: string
        skill_id:
          type: string
        rating:
          type: integer
        review:
          type: string
        created_at:
          type: string
          format: date-time
    Alert:
      type: object
      properties:
        id:
          type: string
        organization_id:
          type: string
        user_id:
          type: string
        type:
          type: string
        condition:
          type: object
        channel:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
    APIKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        prefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
    APIKeyCreated:
      type: object
      properties:
        id:
          type: string
        key:
          type: string
        name:
          type: string
    Webhook:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        events:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
    WebhookStats:
      type: object
      properties:
        total:
          type: integer
        successful:
          type: integer
        failed:
          type: integer
    WebhookDelivery:
      type: object
      properties:
        id:
          type: string
        event_type:
          type: string
        status_code:
          type: integer
        success:
          type: boolean
        created_at:
          type: string
          format: date-time
    Invoice:
      type: object
      properties:
        id:
          type: string
        amount_usd:
          type: number
        status:
          type: string
        created_at:
          type: string
          format: date-time
    CostSummary:
      type: object
      properties:
        total_cost_usd:
          type: number
    TokenSummary:
      type: object
      properties:
        total_tokens:
          type: integer
    ScanResult:
      type: object
      properties:
        findings:
          type: array
          items:
            $ref: '#/components/schemas/Finding'
        score:
          type: number
        summary:
          type: string
    ReviewResult:
      type: object
      properties:
        findings:
          type: array
          items:
            $ref: '#/components/schemas/Finding'
        verdict:
          type: string
        confidence:
          type: number
        fixed_code:
          type: string
    Finding:
      type: object
      properties:
        rule_id:
          type: string
        severity:
          type: string
          enum: [info, warning, error, critical]
        message:
          type: string
        file:
          type: string
        line:
          type: integer
